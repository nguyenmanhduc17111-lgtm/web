<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>HangCamShop</title>
    <style>
        body { font-family: Arial; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        h1 { text-align: center; }
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .product-card {
            width: 250px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .product-info {
            padding: 12px;
        }
        .product-name {
            font-weight: bold;
            margin-bottom: 8px;
        }
        .product-price {
            color: #e74c3c;
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 50px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🛍️ HangCamShop</h1>
    <div id="products" class="products">
        <div class="loading">Đang tải sản phẩm...</div>
    </div>
</div>

<script>
    // Hàm xem chi tiết - được gọi khi click vào sản phẩm
    function viewDetail(productId) {
        console.log('Chuyển đến chi tiết sản phẩm ID:', productId);
        window.location.href = `/product-detail.html?id=${productId}`;
    }

    // Tải danh sách sản phẩm và tạo thẻ HTML
    async function loadProducts() {
        try {
            const response = await fetch('/api/products');
            const data = await response.json();
            const products = data.products || data;

            const container = document.getElementById('products');
            if (!products || products.length === 0) {
                container.innerHTML = '<div class="loading">Chưa có sản phẩm</div>';
                return;
            }

            let html = '';
            for (let p of products) {
                html += `
                    <div class="product-card" onclick="viewDetail(${p.id})">
                        <img src="${p.image || 'https://via.placeholder.com/300'}" 
                             onerror="this.src='https://via.placeholder.com/300'"
                             alt="${p.name}">
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${p.price.toLocaleString('vi-VN')}đ</div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        } catch (error) {
            document.getElementById('products').innerHTML = `<div class="loading">Lỗi: ${error.message}</div>`;
        }
    }

    loadProducts();
</script>
</body>
</html>
